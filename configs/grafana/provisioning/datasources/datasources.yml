# Grafana Datasources Provisioning
# falcon-gateway/configs/grafana/provisioning/datasources/datasources.yml

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://falcon-prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: falcon-postgresql:5432
    database: falcon
    user: falcon
    secureJsonData:
      password: falcon_secret
    jsonData:
      sslmode: disable
      postgresVersion: 1600
    editable: false

  # Add more datasources as needed
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://falcon-loki:3100
